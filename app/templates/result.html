{% if error_message %}
<div class="result-card">
    <p class="error-message">{{ error_message }}</p>
    <div class="result-actions">
        <button type="button" data-select-another>Select another</button>
    </div>
</div>

{% elif result.valid %}
<div class="result-card">
    <h3>Here are you practice sentences</h3>
    <ul class="sentence-list">
        {% for s in result.sentences %}
            <li>
                <div class="sentence-chinese">{{ s.chinese }}</div>
                <div class="sentence-reveal">
                    <button type="button" class="sentence-reveal-button" data-reveal-target=".sentence-pinyin">Show pinyin</button>
                    <div class="sentence-reveal-content">
                        <div class="sentence-meta sentence-pinyin is-hidden">{{ s.pinyin }}</div>
                    </div>
                </div>
                <div class="sentence-reveal">
                    <button type="button" class="sentence-reveal-button" data-reveal-target=".sentence-translation">Show translation</button>
                    <div class="sentence-reveal-content">
                        <div class="sentence-translation is-hidden">{{ s.english }}</div>
                    </div>
                </div>
            </li>
        {% endfor %}
    </ul>
    <div class="result-actions">
        <button type="button" data-select-another>Select another</button>
    </div>
</div>

{% else %}
<div class="result-card">
    <p class="error-message">Generation failed after {{ result.attempts }} attempts.</p>
    <div class="result-actions">
        <button type="button" data-select-another>Select another</button>
    </div>
</div>

{% endif %}
