{% if error_message %}

<p style="color:red;">{{ error_message }}</p>

{% elif result.valid %}

<h3>Generated Sentences:</h3>

<ul>
    {% for s in result.sentences %}
        <li>
            <strong>{{ s.chinese }}</strong><br>
            {{ s.pinyin }}<br>
            {{ s.english }}
        </li>
        <br>
    {% endfor %}
</ul>

{% else %}

<p style="color:red;">Generation failed after {{ result.attempts }} attempts.</p>

{% endif %}
