<!DOCTYPE html>
<html>
<head>
    <title>Mandarin Learning App</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        body {
            font-family: sans-serif;
        }

        .form-actions {
            display: flex;
            align-items: end;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .form-actions label {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .character-columns {
            display: grid;
            gap: 24px;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            margin-top: 16px;
        }

        .character-column {
            border: 1px solid #d0d7de;
            border-radius: 8px;
            padding: 16px;
            background: #f8fafc;
        }

        .character-column h4 {
            margin: 0;
        }

        .character-column-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .character-list label {
            display: block;
            margin-bottom: 8px;
        }

        .character-list.is-scrollable {
            max-height: 320px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .selection-note {
            margin: 8px 0 0;
            color: #57606a;
            font-size: 0.95rem;
        }

        .selection-note.is-error {
            color: #b42318;
        }

        .secondary-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 14px;
            border: 1px solid #d0d7de;
            border-radius: 8px;
            color: inherit;
            text-decoration: none;
            background: #f8fafc;
        }

        .is-hidden {
            display: none;
        }
    </style>
</head>
<body>

<h1>Mandarin Sentence Generator</h1>

<form 
    hx-post="/generate-ui" 
    hx-target="#result-panel" 
    hx-swap="innerHTML"
>
    <div class="form-actions">
        <label>
            Number of sentences:
            <input type="number" name="n_sentences" value="2" min="1" max="5">
        </label>

        <button type="submit">Generate</button>
        <a class="secondary-link" href="/known-characters">汉子 you already know</a>
    </div>

    <div id="selection-panel">
        <h3>Select Characters:</h3>
        <p id="selection-note" class="selection-note">
            Choose up to {{ max_selected_characters }} new characters.
        </p>

        <!-- Character List -->
        <div id="character-list" class="character-columns">
            <section class="character-column">
                <div class="character-column-header">
                    <h4>New Characters</h4>
                    <button type="button" onclick="toggleGroup('new-characters')">Toggle New</button>
                </div>
                <div id="new-characters" class="character-list is-scrollable">
                    {% for char in new_characters %}
                        <label>
                            <input
                                type="checkbox"
                                name="character_ids"
                                value="{{ char.id }}"
                                data-character-checkbox
                            >
                            {{ char.character }} ({{ char.pinyin }}) - {{ char.meaning }}
                        </label>
                    {% endfor %}
                </div>
            </section>
        </div>
    </div>

    <div id="result-panel" class="is-hidden"></div>
</form>

<!-- JavaScript -->
<script>
const maxSelectedCharacters = {{ max_selected_characters }};
let loadingMessageTimeoutId = null;

function toggleGroup(groupId) {
    const checkboxes = Array.from(
        document.querySelectorAll(`#${groupId} input[type="checkbox"]`)
    );
    const shouldSelect = checkboxes.some(cb => !cb.checked && !cb.disabled);

    checkboxes.forEach(cb => {
        if (shouldSelect && getSelectedCount() >= maxSelectedCharacters) {
            return;
        }

        cb.checked = shouldSelect;
    });

    syncCharacterSelectionState();
}

function getCharacterCheckboxes() {
    return Array.from(document.querySelectorAll("[data-character-checkbox]"));
}

function getSelectedCount() {
    return getCharacterCheckboxes().filter(cb => cb.checked).length;
}

function resetCharacterSelection() {
    getCharacterCheckboxes().forEach(cb => {
        cb.checked = false;
        cb.disabled = false;
    });
    syncCharacterSelectionState();
}

function showSelectionPanel() {
    document.getElementById("selection-panel").classList.remove("is-hidden");
    document.getElementById("result-panel").classList.add("is-hidden");
    document.getElementById("result-panel").innerHTML = "";
    resetCharacterSelection();
}

function showLoadingState() {
    const resultPanel = document.getElementById("result-panel");
    document.getElementById("selection-panel").classList.add("is-hidden");
    resultPanel.classList.remove("is-hidden");
    resultPanel.innerHTML = "<p>Just a moment...</p>";

    if (loadingMessageTimeoutId) {
        clearTimeout(loadingMessageTimeoutId);
    }

    loadingMessageTimeoutId = window.setTimeout(() => {
        if (!resultPanel.classList.contains("is-hidden")) {
            resultPanel.innerHTML = "<p>Still working...</p>";
        }
    }, 5000);
}

function syncCharacterSelectionState() {
    const selectedCount = getSelectedCount();
    const selectionNote = document.getElementById("selection-note");
    const reachedLimit = selectedCount >= maxSelectedCharacters;

    getCharacterCheckboxes().forEach(cb => {
        cb.disabled = reachedLimit && !cb.checked;
    });

    selectionNote.textContent = `Selected ${selectedCount} of ${maxSelectedCharacters} new characters.`;
    selectionNote.classList.toggle("is-error", reachedLimit);
}

getCharacterCheckboxes().forEach(cb => {
    cb.addEventListener("change", syncCharacterSelectionState);
});

document.body.addEventListener("click", event => {
    if (!event.target.closest("[data-select-another]")) {
        return;
    }

    showSelectionPanel();
});

document.body.addEventListener("htmx:beforeRequest", event => {
    if (event.detail.target.id !== "result-panel") {
        return;
    }

    showLoadingState();
});

document.body.addEventListener("htmx:afterSwap", event => {
    if (event.detail.target.id !== "result-panel") {
        return;
    }

    if (loadingMessageTimeoutId) {
        clearTimeout(loadingMessageTimeoutId);
        loadingMessageTimeoutId = null;
    }

    document.getElementById("selection-panel").classList.add("is-hidden");
    document.getElementById("result-panel").classList.remove("is-hidden");
});

syncCharacterSelectionState();
</script>

</body>
</html>
