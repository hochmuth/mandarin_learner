<!DOCTYPE html>
<html>
<head>
    <title>Mandarin Learning App</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body>

<h1>Mandarin Sentence Generator</h1>

<form 
    hx-post="/generate-ui" 
    hx-target="#result" 
    hx-swap="innerHTML"
>
    <h3>Select Characters:</h3>

    <!-- Select / Deselect Buttons -->
    <button type="button" onclick="selectAll()">Select All</button>
    <button type="button" onclick="deselectAll()">Deselect All</button>

    <br><br>

    <!-- Character List -->
    <div id="character-list">
        {% for char in characters %}
            <label>
                <input type="checkbox" name="character_ids" value="{{ char.id }}">
                {{ char.character }} ({{ char.pinyin }}) - {{ char.meaning }}
            </label><br>
        {% endfor %}
    </div>

    <br>

    <!-- Sentence Count -->
    <label>
        Number of sentences:
        <input type="number" name="n_sentences" value="2" min="1" max="5">
    </label>

    <br><br>

    <button type="submit">Generate</button>
</form>

<hr>

<!-- Result Area -->
<div id="result"></div>

<!-- JavaScript -->
<script>
function selectAll() {
    document.querySelectorAll('#character-list input[type="checkbox"]')
        .forEach(cb => cb.checked = true);
}

function deselectAll() {
    document.querySelectorAll('#character-list input[type="checkbox"]')
        .forEach(cb => cb.checked = false);
}
</script>

</body>
</html>
