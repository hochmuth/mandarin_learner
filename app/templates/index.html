<!DOCTYPE html>
<html>
<head>
    <title>Mandarin Learning App</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        body {
            font-family: sans-serif;
        }

        .form-actions {
            display: flex;
            align-items: end;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .form-actions label {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .character-columns {
            display: grid;
            gap: 24px;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            margin-top: 16px;
        }

        .character-column {
            border: 1px solid #d0d7de;
            border-radius: 8px;
            padding: 16px;
            background: #f8fafc;
        }

        .character-column h4 {
            margin: 0;
        }

        .character-column-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .character-list label {
            display: block;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

<h1>Mandarin Sentence Generator</h1>

<form 
    hx-post="/generate-ui" 
    hx-target="#result" 
    hx-swap="innerHTML"
>
    <div class="form-actions">
        <label>
            Number of sentences:
            <input type="number" name="n_sentences" value="2" min="1" max="5">
        </label>

        <button type="submit">Generate</button>
    </div>

    <h3>Select Characters:</h3>

    <!-- Character List -->
    <div id="character-list" class="character-columns">
        <section class="character-column">
            <div class="character-column-header">
                <h4>New Characters</h4>
                <button type="button" onclick="toggleGroup('new-characters')">Toggle New</button>
            </div>
            <div id="new-characters" class="character-list">
                {% for char in new_characters %}
                    <label>
                        <input type="checkbox" name="character_ids" value="{{ char.id }}">
                        {{ char.character }} ({{ char.pinyin }}) - {{ char.meaning }}
                    </label>
                {% endfor %}
            </div>
        </section>

        <section class="character-column">
            <div class="character-column-header">
                <h4>Known Characters</h4>
            </div>
            <div id="known-characters" class="character-list">
                {% for char in known_characters %}
                    <label>{{ char.character }} ({{ char.pinyin }}) - {{ char.meaning }}</label>
                {% endfor %}
            </div>
        </section>
    </div>
</form>

<hr>

<!-- Result Area -->
<div id="result"></div>

<!-- JavaScript -->
<script>
function toggleGroup(groupId) {
    const checkboxes = Array.from(
        document.querySelectorAll(`#${groupId} input[type="checkbox"]`)
    );
    const shouldSelect = checkboxes.some(cb => !cb.checked);

    checkboxes.forEach(cb => cb.checked = shouldSelect);
}
</script>

</body>
</html>
