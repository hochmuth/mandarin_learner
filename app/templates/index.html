<!DOCTYPE html>
<html>
<head>
    <title>Mandarin Learning App</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        :root {
            --bg: #ffffff;
            --panel: #ffffff;
            --text: #4b5563;
            --text-strong: #1f2937;
            --border: #e5e7eb;
            --border-strong: #d1d5db;
            --muted: #6b7280;
            --button-bg: #f9fafb;
            --button-hover: #f3f4f6;
            --error: #b42318;
            --shadow: 0 18px 45px rgba(15, 23, 42, 0.06);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
            display: flex;
            justify-content: center;
            padding: 48px 20px;
        }

        .page-shell {
            width: min(100%, 760px);
        }

        .app-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 36px 32px;
            text-align: center;
        }

        h1,
        h3,
        h4 {
            color: var(--text-strong);
            margin-top: 0;
        }

        h1 {
            margin-bottom: 10px;
            font-size: clamp(2rem, 4vw, 2.6rem);
            font-weight: 600;
        }

        h3 {
            margin-bottom: 10px;
            font-size: 1.2rem;
            font-weight: 600;
        }

        h4 {
            margin-bottom: 0;
            font-size: 1rem;
            font-weight: 600;
        }

        p {
            line-height: 1.6;
        }

        .intro {
            max-width: 520px;
            margin: 0 auto 28px;
            color: var(--muted);
        }

        .form-actions {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }

        .form-actions label {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            font-size: 0.95rem;
        }

        input[type="number"] {
            width: 88px;
            padding: 10px 12px;
            border: 1px solid var(--border-strong);
            border-radius: 12px;
            text-align: center;
            font: inherit;
            color: var(--text-strong);
            background: #fff;
        }

        button,
        .secondary-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 10px 16px;
            border: 1px solid var(--border-strong);
            border-radius: 999px;
            color: var(--text-strong);
            text-decoration: none;
            background: var(--button-bg);
            font: inherit;
            transition: background-color 0.2s ease, border-color 0.2s ease;
            cursor: pointer;
        }

        button:hover,
        .secondary-link:hover {
            background: var(--button-hover);
            border-color: #c7cdd6;
        }

        .selection-note,
        .loading-message {
            margin: 0 auto 20px;
            max-width: 520px;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .selection-note.is-error,
        .error-message {
            color: var(--error);
        }

        .character-columns {
            display: grid;
            justify-content: center;
            margin-top: 18px;
        }

        .character-column,
        .result-card {
            width: min(100%, 520px);
            margin: 0 auto;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 22px;
            background: #fcfcfc;
            text-align: left;
        }

        .character-column-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .character-list {
            text-align: left;
        }

        .character-list label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .character-list.is-scrollable {
            max-height: 360px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .character-list.is-scrollable::-webkit-scrollbar {
            width: 8px;
        }

        .character-list.is-scrollable::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 999px;
        }

        .result-card h3 {
            text-align: center;
        }

        .sentence-list {
            list-style: none;
            padding: 0;
            margin: 0 0 20px;
        }

        .sentence-list li {
            border-top: 1px solid var(--border);
            padding: 14px 0;
        }

        .sentence-list li:first-child {
            border-top: 0;
            padding-top: 0;
        }

        .sentence-chinese {
            color: var(--text-strong);
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .sentence-meta {
            color: var(--muted);
            margin-bottom: 2px;
        }

        .sentence-reveal {
            margin-top: 10px;
        }

        .sentence-reveal-button {
            min-height: 36px;
            padding: 8px 14px;
            color: var(--text-strong);
            font-size: 0.95rem;
        }

        .sentence-reveal-value.is-hidden {
            display: none;
        }

        .sentence-reveal-content {
            margin-top: 4px;
            color: var(--muted);
        }

        .result-actions {
            display: flex;
            justify-content: center;
        }

        .is-hidden {
            display: none;
        }

        @media (max-width: 640px) {
            body {
                padding: 24px 14px;
            }

            .app-card {
                padding: 28px 18px;
            }

            .character-column-header {
                flex-direction: column;
                align-items: stretch;
            }

            .character-column,
            .result-card {
                padding: 18px;
            }
        }
    </style>
</head>
<body data-max-selected-characters="{{ max_selected_characters }}">

<main class="page-shell">
    <section class="app-card">
        <h1>Mandarin Sentence Generator</h1>
        <p class="intro">Practice characters you're trying to learn in full sentence context.</p>

        <form
            hx-post="/generate-ui"
            hx-target="#result-panel"
            hx-swap="innerHTML"
        >
            <div id="home-actions" class="form-actions">
                <label>
                    Number of sentences
                    <input type="number" name="n_sentences" value="3" min="1" max="5">
                </label>

                <a class="secondary-link" href="/known-characters">汉子 you already know</a>
            </div>

            <div id="selection-panel">
                <h3>Select a character or a word you want to practice</h3>
                <p id="selection-note" class="selection-note">
                    Choose up to {{ max_selected_characters }} new characters.
                </p>

                <div id="character-list" class="character-columns">
                    <section class="character-column">
                        <div class="character-column-header">
                            <h4>New Characters</h4>
                            <button type="submit">Generate</button>
                        </div>
                        <div id="new-characters" class="character-list is-scrollable">
                            {% for char in new_characters %}
                                <label>
                                    <input
                                        type="checkbox"
                                        name="character_ids"
                                        value="{{ char.id }}"
                                        data-character-checkbox
                                    >
                                    <span>{{ char.character }} ({{ char.pinyin }}) - {{ char.meaning }}</span>
                                </label>
                            {% endfor %}
                        </div>
                    </section>
                </div>
            </div>

            <div id="result-panel" class="is-hidden"></div>
        </form>
    </section>
</main>

<script>
const maxSelectedCharacters = Number(document.body.dataset.maxSelectedCharacters);
const loadingMessages = [
    "Just a moment...",
    "Still working...",
    "耐心是一种美德",
    "This is taking forever, isn't it",
];
let loadingMessageIntervalId = null;

function getCharacterCheckboxes() {
    return Array.from(document.querySelectorAll("[data-character-checkbox]"));
}

function getSelectedCount() {
    return getCharacterCheckboxes().filter(cb => cb.checked).length;
}

function resetCharacterSelection() {
    getCharacterCheckboxes().forEach(cb => {
        cb.checked = false;
        cb.disabled = false;
    });
    syncCharacterSelectionState();
}

function showSelectionPanel() {
    document.getElementById("home-actions").classList.remove("is-hidden");
    document.getElementById("selection-panel").classList.remove("is-hidden");
    document.getElementById("result-panel").classList.add("is-hidden");
    document.getElementById("result-panel").innerHTML = "";
    resetCharacterSelection();
}

function showLoadingState() {
    const resultPanel = document.getElementById("result-panel");
    document.getElementById("home-actions").classList.add("is-hidden");
    document.getElementById("selection-panel").classList.add("is-hidden");
    resultPanel.classList.remove("is-hidden");
    resultPanel.innerHTML = `<p class="loading-message">${loadingMessages[0]}</p>`;

    if (loadingMessageIntervalId) {
        clearInterval(loadingMessageIntervalId);
    }

    let loadingMessageIndex = 1;
    loadingMessageIntervalId = window.setInterval(() => {
        if (resultPanel.classList.contains("is-hidden")) {
            return;
        }

        resultPanel.innerHTML = `<p class="loading-message">${loadingMessages[loadingMessageIndex]}</p>`;
        loadingMessageIndex = (loadingMessageIndex + 1) % loadingMessages.length;
    }, 3000);
}

function syncCharacterSelectionState() {
    const selectedCount = getSelectedCount();
    const selectionNote = document.getElementById("selection-note");
    const reachedLimit = selectedCount >= maxSelectedCharacters;

    getCharacterCheckboxes().forEach(cb => {
        cb.disabled = reachedLimit && !cb.checked;
    });

    selectionNote.textContent = `Selected ${selectedCount} of max ${maxSelectedCharacters} characters.`;
    selectionNote.classList.toggle("is-error", reachedLimit);
}

getCharacterCheckboxes().forEach(cb => {
    cb.addEventListener("change", syncCharacterSelectionState);
});

document.body.addEventListener("click", event => {
    const revealButton = event.target.closest("[data-reveal-target]");
    if (revealButton) {
        const selector = revealButton.dataset.revealTarget;
        const revealValue = revealButton.parentElement.querySelector(selector);

        if (revealValue) {
            revealButton.remove();
            revealValue.classList.remove("is-hidden");
        }

        return;
    }

    if (!event.target.closest("[data-select-another]")) {
        return;
    }

    showSelectionPanel();
});

document.body.addEventListener("htmx:beforeRequest", event => {
    if (event.detail.target.id !== "result-panel") {
        return;
    }

    showLoadingState();
});

document.body.addEventListener("htmx:afterSwap", event => {
    if (event.detail.target.id !== "result-panel") {
        return;
    }

    if (loadingMessageIntervalId) {
        clearInterval(loadingMessageIntervalId);
        loadingMessageIntervalId = null;
    }

    document.getElementById("selection-panel").classList.add("is-hidden");
    document.getElementById("result-panel").classList.remove("is-hidden");
});

syncCharacterSelectionState();
</script>

</body>
</html>
